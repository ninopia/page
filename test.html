<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Basecamp Tokyo Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 이미지 기반 객실 타입 색상 (범례 반영) */
        .type-sw { background-color: #FFFF00; } /* 고정형 워케이션 */
        .type-sw-plus { background-color: #FFB6C1; } /* 변동형 워케이션/출장 */
        .type-reserve { background-color: #FFA500; } /* 예비용 */
        
        /* 이미지 기반 상태 색상 */
        .status-checkin { background-color: #FFC0CB; } /* 체크인 일 */
        .status-checkout { background-color: #FFFFE0; } /* 체크아웃 일 */
        .status-staying { background-color: #00BFFF; color: white; } /* 재실중 */
        
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 1px; background-color: #e2e8f0; border: 1px solid #cbd5e1; }
        .room-cell { background-color: #f8fafc; font-size: 10px; display: flex; flex-direction: column; align-items: center; padding: 4px 2px; height: 100%; border: 0.5px solid #e2e8f0; }
        .room-header { background-color: #000; color: #fff; width: 100%; text-align: center; font-weight: bold; padding: 2px 0; }
    </style>
</head>
<body class="bg-[#D1D5DB] p-4 font-sans text-[12px]">

    <div class="flex justify-between items-start mb-4">
        <div class="flex items-center space-x-2 bg-white p-2 border border-slate-400">
            <span class="font-bold">기간 필터</span>
            <input type="text" value="[ 2026.04.06 ]" class="border px-2 py-1 w-32 text-center">
        </div>
        
        <div class="bg-white border border-slate-400">
            <table class="w-48 text-center">
                <tr class="border-b">
                    <td class="bg-slate-100 border-r p-1">객실 수</td><td class="p-1">63</td>
                </tr>
                <tr class="border-b">
                    <td class="bg-slate-100 border-r p-1">이용객실수</td><td class="p-1">21</td>
                </tr>
                <tr>
                    <td class="bg-slate-100 border-r p-1 font-bold">가동률</td><td class="p-1 font-bold">33%</td>
                </tr>
            </table>
        </div>

        <div class="flex space-x-1">
            <button class="bg-[#1e293b] text-white px-4 py-2 border border-slate-600">새로고침</button>
            <button class="bg-[#166534] text-white px-4 py-2 border border-slate-600">다운로드</button>
            <button class="bg-[#1e293b] text-white px-4 py-2 border border-slate-600">출력</button>
        </div>
    </div>

    <div class="flex gap-4">
        <div class="flex-1 space-y-4">
            <div class="bg-white p-2">
                <div class="room-grid">
                    <script>
                        const rooms = [
                            {no: 501, type: 'L', corp: 'NAVER', status: ''},
                            {no: 502, type: 'S', corp: 'NAVER', status: ''},
                            {no: 503, type: 'S(W)', corp: 'NAVER', status: 'checkin', name: '김보화'},
                            {no: 504, type: 'S(W)', corp: 'NAVER', status: 'checkout', name: '이유진'},
                            {no: 505, type: 'S(W)', corp: 'NAVER', status: ''},
                            {no: 506, type: 'L', corp: 'NAVER', status: ''},
                            {no: 507, type: 'M', corp: 'NAVER', status: 'staying', name: '박정윤'},
                            {no: 508, type: '린넨실', corp: '', status: ''}
                        ];
                        
                        rooms.forEach(r => {
                            let typeClass = r.type === 'S(W)' ? 'type-sw' : '';
                            let statusClass = r.status === 'checkin' ? 'status-checkin' : r.status === 'checkout' ? 'status-checkout' : r.status === 'staying' ? 'status-staying' : '';
                            
                            document.write(`
                                <div class="room-cell">
                                    <div class="room-header">${r.no}</div>
                                    <div class="w-full text-center py-1 font-bold ${typeClass}">${r.type}</div>
                                    <div class="text-[9px] text-slate-500">${r.corp}</div>
                                    <div class="mt-2 h-8 w-full flex items-center justify-center font-bold ${statusClass}">
                                        ${r.name || ''}
                                    </div>
                                    <div class="mt-2 flex space-x-1">
                                        <span class="text-[8px]">●</span><span class="text-[8px]">●</span>
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </div>

            <div class="bg-white p-2">
                <div class="room-grid">
                    <script>
                        const rooms2 = [
                            {no: 201, type: 'M', corp: 'LINE+', status: ''},
                            {no: 202, type: 'S', corp: 'LINE+', status: ''},
                            {no: 203, type: 'S', corp: 'LINE+', status: ''},
                            {no: 207, type: 'S', corp: 'WEVERSE', status: ''},
                            {no: 208, type: 'S', corp: 'WEVERSE', status: ''}
                        ];
                        rooms2.forEach(r => {
                            document.write(`
                                <div class="room-cell">
                                    <div class="room-header">${r.no}</div>
                                    <div class="w-full text-center py-1 font-bold text-blue-600">${r.type}</div>
                                    <div class="text-[9px] font-bold">${r.corp}</div>
                                    <div class="mt-2 h-8"></div>
                                    <div class="flex space-x-1 text-slate-300">
                                        <span>x</span><span>x</span>
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </div>
        </div>
